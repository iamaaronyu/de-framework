name: "llm-distill"
version: "v2.3.1"
description: "LLM data distillation pipeline — reads raw text, runs teacher model inference, writes distilled dataset"

stages:
  - id: data_load
    type: data_loader
    module: "pipelines.llm_distill.stages.data_load"
    class: "DataLoadStage"
    config:
      batch_size: 1000
      shuffle: false
      file_format: "jsonl"

  - id: inference
    type: npu_inference
    module: "pipelines.llm_distill.stages.inference"
    class: "InferenceStage"
    depends_on: [data_load]
    config:
      model: "llm-v2"
      batch_size: 32
      timeout_seconds: 120
      max_retries: 3

  - id: postprocess
    type: data_writer
    module: "pipelines.llm_distill.stages.postprocess"
    class: "PostprocessStage"
    depends_on: [inference]
    config:
      output_format: "jsonl"
      quality_threshold: 0.8
      min_output_tokens: 10
